org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
android.enableJetifier=true

# Fix: Kotlin daemon closing incremental caches concurrently when building
# subprojects (google_sign_in, firebase_storage, etc.) in parallel.
# "in-process" runs the compiler inside the Gradle worker process so every
# subproject shares a single JVM page-cache, avoiding the "Storage already
# registered" AssertionError.
kotlin.compiler.execution.strategy=in-process
org.gradle.parallel=false
